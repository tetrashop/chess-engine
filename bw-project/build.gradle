buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}
apply plugin: 'com.android.application'

android {
    namespace 'com.tetrashop.chessengine'
    compileSdk 34
    defaultConfig {
        applicationId 'com.tetrashop.chessengine'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // استفاده از WebView ساده - همیشه در دسترس
    implementation 'androidx.webkit:webkit:1.8.0'
}
