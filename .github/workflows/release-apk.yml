name: Build APK on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PWA Builder CLI (correct package)
        run: npm install -g @pwabuilder/cli

      - name: Generate APK using pwabuilder.json
        run: |
          npx @pwabuilder/cli package --logLevel info
          # خروجی APK معمولاً در پوشه‌ی android/ تولید می‌شود
          find . -name "*.apk" -exec cp {} ./ \;

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
