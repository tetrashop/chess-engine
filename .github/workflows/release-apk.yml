name: Build APK – Final

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate APK
        uses: JamieMason/generate-pwa-apk-action@v1
        with:
          manifest-url: https://chess-engine.vercel.app/manifest.json
          apk-name: ChessEnginePy.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ChessEnginePy.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
