name: Build APK on Release

on:
  release:
    types: [published]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWA Builder CLI
        run: npm install -g pwabuilder

      - name: Generate APK from PWA manifest
        run: |
          # manifest.json در پوشه‌ی frontend/ قرار دارد
          # PWA Builder از manifest و URL پروژه APK می‌سازد
          npx pwabuilder package -m frontend/manifest.json -d . -l latest -p android

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
