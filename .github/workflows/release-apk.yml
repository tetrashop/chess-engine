name: Build APK on Release

on:
  release:
    types: [published]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWA Builder CLI
        run: npm install -g @pwabuilder/cli

      - name: Generate APK from PWA manifest
        run: |
          # آدرس پروژه روی Vercel (یا دامنه‌ی شما) – مطمئن شوید درست است
          APP_URL="https://chess-engine.vercel.app"
          npx pwabuilder package --manifestFile frontend/manifest.json --url "$APP_URL" --output . --platform android

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
