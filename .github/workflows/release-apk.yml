name: Build APK with Bubblewrap (expect)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-preview-license

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Install expect
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Run bubblewrap init with expect
        run: |
          expect << 'EXPECT_EOF'
          spawn bubblewrap init --manifest https://chess-engine.vercel.app/manifest.json --directory ./bw-project
          expect "Do you want Bubblewrap to install the JDK" { send "no\r" }
          expect "Path to your existing JDK 17:" { send "$env(JAVA_HOME)\r" }
          expect eof
          EXPECT_EOF

      - name: Build APK
        run: |
          cd bw-project
          bubblewrap build

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bw-project/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
