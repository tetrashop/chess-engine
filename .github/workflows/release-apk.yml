name: Build APK with Bubblewrap (non‑interactive)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" > $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-preview-license

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK (non‑interactive)
        run: |
          # پاسخ خودکار: "no" به نصب JDK، سپس مسیر JDK موجود
          printf "no\n$JAVA_HOME\n" | bubblewrap init \
            --manifest https://chess-engine.vercel.app/manifest.json \
            --directory ./bw-project
          cd bw-project
          bubblewrap build

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bw-project/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
